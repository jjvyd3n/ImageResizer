<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok 9:16 Resizer</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  padding: 20px;
  min-height: 100vh;
  color: #333;
}
h2 { margin-bottom: 25px; font-weight:600; color:#fff; text-shadow:1px1px4px rgba(0,0,0,0.3);}
#drop-area {
  border: 2px dashed #fff;
  border-radius: 15px;
  background: rgba(255,255,255,0.2);
  padding: 50px 20px;
  margin-bottom: 25px;
  box-shadow: 0 8px 15px rgba(0,0,0,0.2);
  transition: background 0.3s, transform 0.2s;
  cursor: pointer;
}
#drop-area.dragover { background: rgba(255,255,255,0.35); transform: scale(1.02);}
.gallery { display:flex; flex-direction:column; gap:20px; max-width:420px; margin:0 auto;}
.canvas-container { position:relative; border-radius:12px; overflow:hidden; box-shadow:0 6px 12px rgba(0,0,0,0.15);}
canvas { display:none; }
.resized-img { width:100%; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.15);}
@media (max-width:500px){ #drop-area{padding:40px 15px;} .canvas-container{max-width:95%;}}
</style>
</head>
<body>
<h2>TikTok 9:16 Resizer</h2>
<div id="drop-area">Tap or Drop Images Here</div>
<div class="gallery" id="output"></div>
<script>
const dropArea = document.getElementById('drop-area');
const output = document.getElementById('output');

dropArea.addEventListener('click',()=>{
  const fileInput=document.createElement('input');
  fileInput.type='file';
  fileInput.multiple=true;
  fileInput.accept='image/*';
  fileInput.onchange=e=>handleFiles(e.target.files);
  fileInput.click();
});

dropArea.addEventListener('dragover',e=>{ e.preventDefault(); dropArea.classList.add('dragover'); });
dropArea.addEventListener('dragleave',()=>dropArea.classList.remove('dragover'));
dropArea.addEventListener('drop',e=>{ e.preventDefault(); dropArea.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

function handleFiles(files){
  Array.from(files).forEach(file=>{
    if(!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>createCanvas(img);
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function createCanvas(img){
  const container=document.createElement('div');
  container.className='canvas-container';

  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d');

  // 9:16 crop
  let targetWidth,targetHeight;
  const imgRatio=img.width/img.height;
  const targetRatio=9/16;

  if(imgRatio>targetRatio){
    targetHeight=img.height;
    targetWidth=targetHeight*targetRatio;
  }else{
    targetWidth=img.width;
    targetHeight=targetWidth/targetRatio;
  }

  canvas.width=targetWidth;
  canvas.height=targetHeight;

  const sx=(img.width-targetWidth)/2;
  const sy=(img.height-targetHeight)/2;

  // Draw the main image
  ctx.drawImage(img,sx,sy,targetWidth,targetHeight,0,0,targetWidth,targetHeight);

  // TikTok-style black bars (5% top and bottom)
  const barHeight = targetHeight * 0.05;
  ctx.fillStyle = 'black';
  ctx.fillRect(0,0,targetWidth,barHeight); // top
  ctx.fillRect(0,targetHeight-barHeight,targetWidth,barHeight); // bottom

  // Convert canvas to iPhone-friendly <img>
  const finalImg = new Image();
  finalImg.src = canvas.toDataURL('image/png',1);
  finalImg.className='resized-img';
  finalImg.alt='TikTok 9:16 resized';
  container.appendChild(finalImg);

  output.appendChild(container);
}
</script>
</body>
</html>
