<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Resizer</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  min-height:100vh;
  color:white;
}

h1 {
  text-align:center;
  padding:15px 10px 5px;
  font-size:20px;
}

/* TOP BAR */
.topbar {
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  padding-bottom:10px;
}

button {
  padding:8px 14px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}

.active {
  background:black;
  color:white;
}

/* DROP AREA */
#drop {
  margin:15px;
  padding:30px;
  border:2px dashed white;
  border-radius:12px;
  text-align:center;
}

/* GALLERY */
.gallery {
  max-width:420px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:15px;
  padding-bottom:40px;
}

.item {
  position:relative;
  border-radius:12px;
  overflow:hidden;
  animation: fade 0.3s ease;
}

.item img {
  width:100%;
  display:block;
}

/* DELETE */
.delete {
  position:absolute;
  top:6px;
  right:6px;
  background:red;
  color:white;
  font-size:12px;
}

/* FULLSCREEN VIEWER */
.viewer {
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:100;
}

.viewer img {
  max-width:100%;
  max-height:100%;
}

/* ANIMATION */
@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}
</style>
</head>
<body>

<h1>TikTok 9:16 Resizer</h1>

<div class="topbar">
  <button id="stretch">Stretch</button>
  <button id="fit">Fit</button>
  <button id="clear">Clear</button>
</div>

<div id="drop">Tap or Drop Images</div>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer">
  <img id="viewerImg">
</div>

<script>
let mode = localStorage.getItem("mode") || "stretch";
let bgColor = "white";

const stretchBtn = document.getElementById("stretch");
const fitBtn = document.getElementById("fit");
const clearBtn = document.getElementById("clear");
const gallery = document.getElementById("gallery");
const drop = document.getElementById("drop");

const viewer = document.getElementById("viewer");
const viewerImg = document.getElementById("viewerImg");

/* UI STATE */
function updateUI(){
  stretchBtn.classList.toggle("active", mode==="stretch");
  fitBtn.classList.toggle("active", mode==="fit");
}
updateUI();

/* BUTTONS */
stretchBtn.onclick = () => {
  mode="stretch";
  localStorage.setItem("mode", mode);
  updateUI();
};

fitBtn.onclick = () => {
  mode="fit";
  localStorage.setItem("mode", mode);
  updateUI();
};

clearBtn.onclick = () => gallery.innerHTML = "";

/* FILE INPUT */
drop.onclick = () => {
  const input = document.createElement("input");
  input.type="file";
  input.multiple=true;
  input.accept="image/*";
  input.onchange = e => handleFiles(e.target.files);
  input.click();
};

/* HANDLE FILES */
function handleFiles(files){
  [...files].forEach(file=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>process(img);
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* PROCESS IMAGE */
function process(img){
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const W = 540;
  const H = 960;

  canvas.width = W;
  canvas.height = H;

  if(mode==="stretch"){
    ctx.drawImage(img,0,0,W,H);
  } else {
    // blur background
    ctx.filter="blur(25px)";
    ctx.drawImage(img,0,0,W,H);
    ctx.filter="none";

    const scale = Math.min(W/img.width, H/img.height);
    const w = img.width*scale;
    const h = img.height*scale;

    const x = (W-w)/2;
    const y = (H-h)/2;

    ctx.drawImage(img,0,0,img.width,img.height,x,y,w,h);
  }

  const url = canvas.toDataURL("image/png");

  const div = document.createElement("div");
  div.className="item";

  const image = document.createElement("img");
  image.src = url;

  /* FULLSCREEN */
  image.onclick = ()=>{
    viewer.style.display="flex";
    viewerImg.src = url;
  };

  /* DELETE */
  const del = document.createElement("button");
  del.textContent="X";
  del.className="delete";
  del.onclick = ()=>div.remove();

  div.appendChild(image);
  div.appendChild(del);
  gallery.appendChild(div);
}

/* VIEWER CLOSE */
viewer.onclick = ()=> viewer.style.display="none";

/* SWIPE */
let startX = 0;

viewer.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

viewer.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;

  if(Math.abs(startX-endX)>50){
    let imgs = [...document.querySelectorAll(".item img")];
    let i = imgs.findIndex(img=>img.src===viewerImg.src);

    if(startX > endX && i < imgs.length-1){
      viewerImg.src = imgs[i+1].src;
    }

    if(startX < endX && i > 0){
      viewerImg.src = imgs[i-1].src;
    }
  }
});
</script>

</body>
</html>
