<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Toolkit Pro (9:16 Format)</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  color:white;
  min-height:100vh;
  background: linear-gradient(-45deg, #667eea, #764ba2, #ff758c, #ff7eb3);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

h1 {
  text-align:center;
  font-size:20px;
  font-weight:600;
  padding:18px 10px 10px;
}

.nav {
  display:flex;
  justify-content:center;
  gap:8px;
  padding:10px;
}

.nav button {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(6px);
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:10px;
  font-weight:500;
}

.nav button.active {
  background:white;
  color:black;
}

.section {
  display:none;
  padding:12px;
  animation: fadeIn 0.4s ease;
}

.section.active { display:block; }

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px)}
  to {opacity:1;}
}

button {
  border:none;
  border-radius:10px;
  padding:7px 10px;
  font-weight:500;
}

button:active { transform:scale(0.95); }

.red {
  background:#ff4d4d;
  color:white;
}

.gallery {
  max-width:360px;
  margin:15px auto;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.item {
  position:relative;
  border-radius:12px;
  overflow:hidden;
  animation: smoothIn 0.4s ease;
}

@keyframes smoothIn {
  from {opacity:0; transform:scale(0.96)}
  to {opacity:1;}
}

.item img { width:100%; }

.delete {
  position:absolute;
  top:6px;
  right:6px;
  background:#ff4d4d;
  color:white;
  font-size:12px;
}

.drop {
  margin:15px auto;
  max-width:360px;
  padding:22px;
  border:2px dashed rgba(255,255,255,0.5);
  border-radius:12px;
  text-align:center;
}

.control {
  max-width:300px;
  margin:10px auto;
  text-align:center;
  font-size:14px;
}

input[type="range"] {
  width:90%;
  margin-top:6px;
}

.box {
  max-width:360px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

textarea, input {
  border:none;
  border-radius:10px;
  padding:10px;
  font-size:14px;
}

img {
  width:100%;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>Image Toolkit Pro (9:16 Format)</h1>

<div class="nav">
  <button class="active" onclick="show('resizer',this)">Resizer</button>
  <button onclick="show('text',this)">Text</button>
  <button onclick="show('gif',this)">GIF</button>
</div>

<!-- RESIZER -->
<div id="resizer" class="section active">

<div class="control">
Resolution
<input type="range" id="quality" min="10" max="100" value="100">
<span id="qval">100%</span>
</div>

<div class="control">
<button id="clear" class="red">Clear All</button>
</div>

<div class="drop" onclick="pick()">Tap or Drop Images</div>
<div class="gallery" id="gallery"></div>

</div>

<!-- TEXT -->
<div id="text" class="section">
<div class="box">

<input id="input" placeholder="Type here...">

<label><input type="checkbox" id="rev"> Reverse</label>
<label><input type="checkbox" id="flip"> Upside Down</label>

<textarea id="out" rows="4"></textarea>

<button onclick="copy()">Copy</button>

</div>
</div>

<!-- GIF -->
<div id="gif" class="section">

<div class="drop" onclick="pickGif()">Tap or Drop Images</div>

<div class="control">
Speed: <span id="speedVal">0.40s</span>
<input type="range" id="speed" min="50" max="1000" value="400">
</div>

<img id="gifPreview">

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

<script>
function show(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

/* RESIZER */
const gallery=document.getElementById("gallery");
const q=document.getElementById("quality");
const qval=document.getElementById("qval");
q.oninput=()=>qval.textContent=q.value+"%";

function pick(){
  const i=document.createElement("input");
  i.type="file"; i.multiple=true; i.accept="image/*";
  i.onchange=e=>handle(e.target.files);
  i.click();
}

function handle(files){
  [...files].forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>process(img);
      img.src=e.target.result;
    };
    r.readAsDataURL(f);
  });
}

function process(img){
  const c=document.createElement("canvas");
  const ctx=c.getContext("2d");

  const scale=q.value/100;
  c.width=540*scale;
  c.height=960*scale;

  ctx.drawImage(img,0,0,c.width,c.height);

  const url=c.toDataURL("image/jpeg",1);

  const div=document.createElement("div");
  div.className="item";

  const image=document.createElement("img");
  image.src=url;

  const del=document.createElement("button");
  del.textContent="X";
  del.className="delete";
  del.onclick=()=>div.remove();

  div.appendChild(image);
  div.appendChild(del);
  gallery.appendChild(div);
}

document.getElementById("clear").onclick=()=>gallery.innerHTML="";

/* TEXT */
const map={'a':'ɐ','b':'q','c':'ɔ','d':'p','e':'ǝ'};
function update(){
  let v=input.value;
  if(rev.checked) v=v.split('').reverse().join('');
  if(flip.checked) v=v.split('').map(c=>map[c]||c).reverse().join('');
  out.value=v;
}
input.oninput=update;
rev.onchange=update;
flip.onchange=update;

function copy(){
  navigator.clipboard.writeText(out.value);
}

/* GIF */
let gifImgs=[];
function pickGif(){
  const i=document.createElement("input");
  i.type="file"; i.multiple=true; i.accept="image/*";
  i.onchange=e=>{
    gifImgs=[...e.target.files];
    generateGif();
  };
  i.click();
}

function generateGif(){
  if(!gifImgs.length) return;

  const gif = new GIF({
    workers:2,
    quality:1,
    width:540,
    height:960
  });

  let loaded=0;

  gifImgs.forEach(file=>{
    const img=new Image();
    img.src=URL.createObjectURL(file);

    img.onload=()=>{
      gif.addFrame(img,{delay:speed.value});
      loaded++;

      if(loaded===gifImgs.length){
        gif.on('finished', blob=>{
          const url=URL.createObjectURL(blob);
          document.getElementById("gifPreview").src=url;
        });
        gif.render();
      }
    };
  });
}

speed.oninput=()=>{
  speedVal.textContent=(speed.value/1000).toFixed(2)+"s";
};
</script>

</body>
</html>
