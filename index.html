<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Toolkit Pro (9:16 Format)</title>

<style>
/* FONT + BASE */
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color:white;
  min-height:100vh;

  background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
  background-size: 400% 400%;
  animation: gradientMove 18s ease infinite;
}

@keyframes gradientMove {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* TITLE */
h1 {
  text-align:center;
  font-size:20px;
  font-weight:600;
  padding:16px 10px 10px;
}

/* NAV */
.nav {
  display:flex;
  justify-content:center;
  gap:8px;
  padding:10px;
}

.nav button {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(6px);
  color:white;
  border:none;
  padding:7px 12px;
  border-radius:10px;
  font-weight:500;
  transition: all 0.3s ease;
}

.nav button.active {
  background:white;
  color:black;
}

/* SECTIONS */
.section {
  display:none;
  padding:12px;
  animation: fadeIn 0.4s ease;
}

.section.active { display:block; }

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px)}
  to {opacity:1; transform:translateY(0)}
}

/* BUTTONS */
button {
  border:none;
  border-radius:10px;
  padding:8px 12px;
  font-weight:500;
  cursor:pointer;
  transition: all 0.2s ease;
}

button:active { transform:scale(0.95); }

.red {
  background:#ff4d4d;
  color:white;
}

/* RESIZER */
.gallery {
  max-width:360px;
  margin:15px auto;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.item {
  position:relative;
  border-radius:12px;
  overflow:hidden;
  animation: smoothIn 0.4s ease;
}

@keyframes smoothIn {
  from {opacity:0; transform:scale(0.96)}
  to {opacity:1; transform:scale(1)}
}

.item img { width:100%; }

.delete {
  position:absolute;
  top:6px;
  right:6px;
  background:#ff4d4d;
  color:white;
  font-size:12px;
}

/* DROP */
.drop {
  margin:15px auto;
  max-width:360px;
  padding:24px;
  border:2px dashed rgba(255,255,255,0.5);
  border-radius:12px;
  text-align:center;
  transition:0.3s;
}

.drop:hover {
  background:rgba(255,255,255,0.1);
}

/* CONTROLS */
.control {
  max-width:360px;
  margin:10px auto;
  text-align:center;
}

input[type="range"] {
  width:100%;
}

/* TEXT */
.box {
  max-width:360px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

textarea, input {
  border:none;
  border-radius:10px;
  padding:10px;
  font-size:14px;
}

/* GIF */
canvas {
  width:100%;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>Image Toolkit Pro (9:16 Format)</h1>

<div class="nav">
  <button class="active" onclick="show('resizer',this)">Resizer</button>
  <button onclick="show('text',this)">Text</button>
  <button onclick="show('gif',this)">GIF</button>
</div>

<!-- RESIZER -->
<div id="resizer" class="section active">

<div class="control">
Resolution
<input type="range" id="quality" min="10" max="100" value="100">
<span id="qval">100%</span>
</div>

<div class="control">
<button id="clear" class="red">Clear All</button>
</div>

<div class="drop" onclick="pick()">Tap or Drop Images</div>
<div class="gallery" id="gallery"></div>

</div>

<!-- TEXT -->
<div id="text" class="section">
<div class="box">

<input id="input" placeholder="Type here...">

<label><input type="checkbox" id="rev"> Reverse</label>
<label><input type="checkbox" id="flip"> Upside Down</label>

<textarea id="out" rows="4"></textarea>

<button onclick="copy()">Copy</button>

</div>
</div>

<!-- GIF -->
<div id="gif" class="section">

<div class="drop" onclick="pickGif()">Tap or Drop Images</div>

<div class="control">
Speed: <span id="speedVal">0.4s</span>
<input type="range" id="speed" min="100" max="1000" value="400">
</div>

<canvas id="gifCanvas"></canvas>

</div>

<script>
/* NAV */
function show(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

/* RESIZER */
const gallery=document.getElementById("gallery");
const q=document.getElementById("quality");
const qval=document.getElementById("qval");

q.oninput=()=>qval.textContent=q.value+"%";

function pick(){
  const i=document.createElement("input");
  i.type="file"; i.multiple=true; i.accept="image/*";
  i.onchange=e=>handle(e.target.files);
  i.click();
}

function handle(files){
  [...files].forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>process(img);
      img.src=e.target.result;
    };
    r.readAsDataURL(f);
  });
}

function process(img){
  const c=document.createElement("canvas");
  const ctx=c.getContext("2d");

  const scale=q.value/100;
  c.width=540*scale;
  c.height=960*scale;

  ctx.drawImage(img,0,0,c.width,c.height);

  const url=c.toDataURL("image/jpeg",1);

  const div=document.createElement("div");
  div.className="item";

  const image=document.createElement("img");
  image.src=url;

  const del=document.createElement("button");
  del.textContent="X";
  del.className="delete";
  del.onclick=()=>div.remove();

  div.appendChild(image);
  div.appendChild(del);
  gallery.appendChild(div);
}

document.getElementById("clear").onclick=()=>gallery.innerHTML="";

/* TEXT */
const map={'a':'ɐ','b':'q','c':'ɔ','d':'p','e':'ǝ'};
function update(){
  let v=input.value;
  if(rev.checked) v=v.split('').reverse().join('');
  if(flip.checked) v=v.split('').map(c=>map[c]||c).reverse().join('');
  out.value=v;
}
input.oninput=update;
rev.onchange=update;
flip.onchange=update;

function copy(){
  navigator.clipboard.writeText(out.value);
}

/* GIF */
let gifImgs=[];
function pickGif(){
  const i=document.createElement("input");
  i.type="file"; i.multiple=true; i.accept="image/*";
  i.onchange=e=>{
    gifImgs=[...e.target.files].map(f=>{
      const img=new Image();
      img.src=URL.createObjectURL(f);
      return img;
    });
    startGif();
  };
  i.click();
}

const canvas=document.getElementById("gifCanvas");
const ctx=canvas.getContext("2d");

function startGif(){
  if(!gifImgs.length) return;
  canvas.width=540;
  canvas.height=960;

  let i=0;
  setInterval(()=>{
    ctx.drawImage(gifImgs[i%gifImgs.length],0,0,540,960);
    i++;
  },speed.value);
}

speed.oninput=()=>{
  speedVal.textContent=(speed.value/1000).toFixed(1)+"s";
};
</script>

</body>
</html>
