<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Resizer Pro (9:16 Format)</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color:white;
  min-height:100vh;
}

h1 {
  text-align:center;
  padding:12px;
  font-size:20px;
}

/* TOP BAR */
.topbar {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  padding-bottom:10px;
}

button, select, input {
  padding:6px 10px;
  border-radius:8px;
  border:none;
  font-weight:600;
}

.active {
  background:black;
  color:white;
}

/* DROP */
#drop {
  margin:10px;
  padding:25px;
  border:2px dashed white;
  border-radius:10px;
  text-align:center;
}

/* GALLERY */
.gallery {
  max-width:350px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
  padding-bottom:40px;
}

.item {
  position:relative;
  border-radius:10px;
  overflow:hidden;
  animation: fade 0.3s ease;
}

.item img {
  width:100%;
}

/* DELETE */
.delete {
  position:absolute;
  top:5px;
  right:5px;
  background:red;
  color:white;
  font-size:11px;
}

/* ANIMATION */
@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}
</style>
</head>
<body>

<h1>9:16 Resizer</h1>

<div class="topbar">
  <button id="stretch">Stretch</button>
  <button id="fit">Fit</button>

  <select id="fitMode">
    <option value="blur">Blur BG</option>
    <option value="color">Color BG</option>
    <option value="white">White BG</option>
  </select>

  <input type="color" id="colorPicker" value="#000000">

  <input type="range" id="quality" min="0.7" max="1" step="0.05" value="1">

  <button id="clear">Clear</button>
</div>

<div id="drop">Tap or Drop Images</div>

<div class="gallery" id="gallery"></div>

<script>
let mode = localStorage.getItem("mode") || "stretch";
let fitMode = localStorage.getItem("fitMode") || "blur";

const stretchBtn = document.getElementById("stretch");
const fitBtn = document.getElementById("fit");
const clearBtn = document.getElementById("clear");
const gallery = document.getElementById("gallery");

const fitSelect = document.getElementById("fitMode");
const colorPicker = document.getElementById("colorPicker");
const qualitySlider = document.getElementById("quality");

fitSelect.value = fitMode;

/* UI */
function updateUI(){
  stretchBtn.classList.toggle("active", mode==="stretch");
  fitBtn.classList.toggle("active", mode==="fit");
}
updateUI();

/* BUTTONS */
stretchBtn.onclick = () => {
  mode="stretch";
  localStorage.setItem("mode", mode);
  updateUI();
};

fitBtn.onclick = () => {
  mode="fit";
  localStorage.setItem("mode", mode);
  updateUI();
};

fitSelect.onchange = () => {
  fitMode = fitSelect.value;
  localStorage.setItem("fitMode", fitMode);
};

clearBtn.onclick = () => gallery.innerHTML = "";

/* FILE INPUT */
document.getElementById("drop").onclick = () => {
  const input = document.createElement("input");
  input.type="file";
  input.multiple=true;
  input.accept="image/*";
  input.onchange = e => handleFiles(e.target.files);
  input.click();
};

function handleFiles(files){
  [...files].forEach(file=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>process(img);
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function process(img){
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const W = 540;
  const H = 960;
  canvas.width = W;
  canvas.height = H;

  if(mode==="stretch"){
    ctx.drawImage(img,0,0,W,H);
  } else {

    // BACKGROUND OPTIONS
    if(fitMode==="blur"){
      ctx.filter="blur(30px)";
      ctx.drawImage(img,0,0,W,H);
      ctx.filter="none";
    }
    else if(fitMode==="color"){
      ctx.fillStyle = colorPicker.value;
      ctx.fillRect(0,0,W,H);
    }
    else {
      ctx.fillStyle = "white";
      ctx.fillRect(0,0,W,H);
    }

    // CENTER IMAGE
    const scale = Math.min(W/img.width, H/img.height);
    const w = img.width*scale;
    const h = img.height*scale;
    const x = (W-w)/2;
    const y = (H-h)/2;

    ctx.drawImage(img,0,0,img.width,img.height,x,y,w,h);
  }

  const url = canvas.toDataURL("image/jpeg", qualitySlider.value);

  const div = document.createElement("div");
  div.className="item";

  const image = document.createElement("img");
  image.src = url;

  const del = document.createElement("button");
  del.textContent="X";
  del.className="delete";
  del.onclick = ()=>div.remove();

  div.appendChild(image);
  div.appendChild(del);
  gallery.appendChild(div);
}
</script>

</body>
</html>
