<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Toolkit Pro (9:16 Format)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* --- General Styles --- */
html, body {margin:0; padding:0; height:100%; width:100%;}
body {font-family:'Inter', system-ui, sans-serif; color:white; overflow-x:hidden;}

/* FULLSCREEN GRADIENT */
body {
  background: linear-gradient(-45deg, #667eea, #764ba2, #ff758c, #ff7eb3);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  min-height: 100vh;
}

@keyframes gradientBG {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Title */
h1 {text-align:center; font-size:28px; font-weight:700; letter-spacing:-0.5px; padding:20px 10px 10px;}

/* Tabs */
.nav {display:flex; justify-content:center; gap:8px; position:relative; padding:10px 0 20px;}
.nav button {
  background: rgba(255,255,255,0.15); backdrop-filter: blur(6px);
  color:white; border:none; padding:6px 10px; border-radius:10px; position:relative; z-index:1;
  transition: transform 0.2s;
}
.nav button.active {color:black;}
.nav::after {content:""; position:absolute; bottom:0; left:0; height:3px; width:0; background:white; border-radius:2px; transition:0.3s all ease;}

/* Section */
.section {display:none; padding:12px;}
.section.active {display:block; transition: opacity 0.4s ease-in-out;}
button {border:none; border-radius:10px; padding:7px 10px; cursor:pointer;}
button:active {transform:scale(0.95);}
.red {background:#ff4d4d; color:white;}

/* Resizer */
.gallery {max-width:360px; margin:15px auto; display:flex; flex-direction:column; gap:14px;}
.item {position:relative; border-radius:12px; overflow:hidden;}
.item img {width:100%; display:block;}
.delete {position:absolute; top:6px; right:6px; background:#ff4d4d; color:white; font-size:12px;}
.drop {margin:15px auto; max-width:360px; padding:22px; border:2px dashed rgba(255,255,255,0.5); border-radius:12px; text-align:center; cursor:pointer;}
.control {max-width:300px; margin:10px auto; text-align:center; font-size:14px;}
input[type="range"] {width:90%;}

/* Text tool */
.box {max-width:360px; margin:auto; display:flex; flex-direction:column; gap:10px;}
textarea, input {border:none; border-radius:10px; padding:10px; font-size:14px;}

/* GIF tool */
.gif-list {max-width:360px; margin:10px auto; display:flex; flex-direction:column; gap:10px;}
.gif-item {position:relative; border-radius:12px; overflow:hidden; cursor:pointer; background:white; padding:2px;}
.gif-item img {width:100%; display:block;}
</style>
</head>
<body>

<h1>Image Toolkit Pro (9:16 Format)</h1>

<div class="nav" id="nav">
  <button class="active" onclick="show('resizer',this)">Resizer</button>
  <button onclick="show('text',this)">Text</button>
  <button onclick="show('gif',this)">GIF</button>
</div>

<!-- RESIZER -->
<div id="resizer" class="section active">
  <div class="control">
    Resolution
    <input type="range" id="quality" min="10" max="100" value="100">
    <span id="qval">100%</span>
  </div>
  <div class="control"><button id="clear" class="red">Clear All</button></div>
  <div class="drop" onclick="pick()">Tap or Drop Images</div>
  <div class="gallery" id="gallery"></div>
</div>

<!-- TEXT TOOL -->
<div id="text" class="section">
  <div class="box">
    <input id="input" placeholder="Type here...">
    <label><input type="checkbox" id="flip"> Upside Down</label>
    <label><input type="checkbox" id="reverse"> Reverse</label>
    <textarea id="out" rows="4" readonly></textarea>
    <button onclick="copy()">Copy</button>
  </div>
</div>

<!-- GIF TOOL -->
<div id="gif" class="section">
  <div class="drop" onclick="pickGif()">Tap or Drop Images</div>
  <div class="gif-list" id="gifList"></div>
  <div class="control">
    <button class="red" onclick="clearGif()">Clear All</button>
    <button onclick="generateGif()">Generate GIF</button>
  </div>
  <div class="control">
    Resolution: <input type="range" id="gifRes" min="100" max="960" value="540">
    <span id="gifResVal">540</span>
  </div>
  <div class="control">
    Speed: <span id="speedVal">5.00</span>
    <input type="range" id="speed" min="0" max="10" step="0.01" value="5">
  </div>
  <img id="gifPreview">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script>
/* NAV TABS */
const nav=document.getElementById("nav");
const underline=document.createElement("div");
underline.style.position="absolute";
underline.style.height="3px";
underline.style.background="white";
underline.style.bottom="0";
underline.style.transition="0.3s all ease";
nav.appendChild(underline);

function show(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const rect=btn.getBoundingClientRect();
  const navRect=nav.getBoundingClientRect();
  underline.style.width=rect.width+"px";
  underline.style.left=(rect.left-navRect.left)+"px";
}

/* RESIZER */
const gallery=document.getElementById("gallery");
const q=document.getElementById("quality");
const qval=document.getElementById("qval");
q.oninput=()=>qval.textContent=parseInt(q.value)+"%";

function pick(){
  const i=document.createElement("input");
  i.type="file"; i.multiple=true; i.accept="image/*";
  i.onchange=e=>handle(e.target.files);
  i.click();
}

function handle(files){
  [...files].forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>process(img);
      img.src=e.target.result;
    };
    r.readAsDataURL(f);
  });
}

function process(img){
  const c=document.createElement("canvas");
  const ctx=c.getContext("2d");
  const scale=q.value/100;
  c.width=540*scale; c.height=960*scale;
  ctx.drawImage(img,0,0,c.width,c.height);
  const url=c.toDataURL("image/jpeg",1);

  const div=document.createElement("div");
  div.className="item";
  const image=document.createElement("img"); image.src=url;
  const del=document.createElement("button"); del.textContent="X"; del.className="delete";
  del.onclick=()=>div.remove();
  div.appendChild(image); div.appendChild(del); gallery.appendChild(div);
}
document.getElementById("clear").onclick=()=>gallery.innerHTML="";

/* TEXT TOOL */
const input=document.getElementById("input");
const flip=document.getElementById("flip");
const reverse=document.getElementById("reverse");
const out=document.getElementById("out");
input.oninput=update;
flip.onchange=update;
reverse.onchange=update;
function update(){
  let v=input.value;
  if(reverse.checked)v=v.split('').reverse().join('');
  if(flip.checked)v=v.split('').map(c=>c.charCodeAt(0)).map(c=>0xFFFF-c).map(c=>String.fromCharCode(c)).join('');
  out.value=v;
}
function copy(){navigator.clipboard.writeText(out.value);}

/* GIF TOOL */
let gifImgs=[];
const gifList=document.getElementById("gifList");
const gifPreview=document.getElementById("gifPreview");
const speed=document.getElementById("speed");
const speedVal=document.getElementById("speedVal");
const gifRes=document.getElementById("gifRes");
const gifResVal=document.getElementById("gifResVal");
speed.oninput=()=>{speedVal.textContent=parseFloat(speed.value).toFixed(2);};
gifRes.oninput=()=>{gifResVal.textContent=gifRes.value;};

function pickGif(){
  const i=document.createElement("input");
  i.type="file"; i.multiple=true; i.accept="image/*";
  i.onchange=e=>{
    gifImgs=[...gifImgs,...e.target.files];
    renderList();
  };
  i.click();
}

function renderList(){
  gifList.innerHTML="";
  gifImgs.forEach((file,index)=>{
    const div=document.createElement("div"); div.className="gif-item";
    const img=document.createElement("img"); img.src=URL.createObjectURL(file);
    const del=document.createElement("button"); del.textContent="X"; del.className="delete";
    del.onclick=()=>{gifImgs.splice(index,1); renderList();};
    div.appendChild(img); div.appendChild(del); gifList.appendChild(div);
  });
}

function clearGif(){ gifImgs=[]; gifList.innerHTML=""; gifPreview.src=""; }

function generateGif(){
  if(!gifImgs.length) return;
  const gif=new GIF({workers:2,quality:1,width:parseInt(gifRes.value),height:parseInt(gifRes.value*16/9)});
  let loaded=0;
  gifImgs.forEach(file=>{
    const img=new Image();
    img.src=URL.createObjectURL(file);
    img.onload=()=>{
      const delay=1000/(parseFloat(speed.value)||1);
      gif.addFrame(img,{delay});
      loaded++;
      if(loaded===gifImgs.length){
        gif.on('finished',blob=>{gifPreview.src=URL.createObjectURL(blob);});
        gif.render();
      }
    };
  });
}
</script>

</body>
</html>
