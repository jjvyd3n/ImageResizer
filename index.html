<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Toolkit Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.3.2/gifshot.min.js"></script>
<style>
/* --- Reset & font --- */
* {box-sizing:border-box; margin:0; padding:0;}
html, body {height:100%; width:100%; font-family:'Inter',system-ui,sans-serif; overflow-x:hidden; color:white;}

/* --- Fullscreen gradient background --- */
#gradientBG {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  z-index:-1;
  background: linear-gradient(120deg, #667eea, #764ba2, #ff758c, #ff7eb3);
  background-size: 600% 600%;
  animation: gradientBG 20s ease infinite;
}
@keyframes gradientBG {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

/* --- Headings --- */
h1 {text-align:center; font-size:28px; font-weight:800; padding:20px 10px 10px; z-index:1;}

/* --- Tabs --- */
.nav {display:flex; justify-content:center; gap:12px; padding:10px 0 20px; position:relative; z-index:1;}
.nav button {background: rgba(255,255,255,0.15); backdrop-filter: blur(6px); color:white; border:none; padding:8px 14px; border-radius:12px; font-weight:500; transition: all 0.3s ease;}
.nav button.active {color:black; background: rgba(255,255,255,0.7);}
.nav::after {content:''; position:absolute; bottom:0; left:0; width:100%; height:2px; background: rgba(255,255,255,0.3);}

/* --- Sections --- */
.section {display:none; flex-direction:column; gap:12px; margin:auto; max-width:420px; padding:16px; border-radius:16px; background: rgba(0,0,0,0.25); backdrop-filter: blur(8px);}
.section.active {display:flex; transition: opacity 0.4s ease;}

/* --- Drop Boxes --- */
.drop {padding:20px; border:2px dashed rgba(255,255,255,0.5); border-radius:16px; text-align:center; cursor:pointer; transition: transform 0.2s ease, background 0.2s ease;}
.drop:hover {background: rgba(255,255,255,0.1);}

/* --- Gallery --- */
.gallery, .gif-list {max-width:360px; margin:10px auto; display:flex; flex-direction:column; gap:8px; overflow-y:auto;}
.item, .gif-item {position:relative;}
.item img, .gif-item img {width:100%; border-radius:12px; transition: transform 0.25s ease, filter 0.25s ease;}
.item img:hover, .gif-item img:hover {transform: scale(1.03); filter: brightness(1.1);}
.delete {position:absolute; top:6px; right:6px; background:#ff4d4d; color:white; font-size:12px; cursor:pointer; border:none; border-radius:6px; padding:2px 6px;}

/* --- Controls --- */
.control {max-width:300px; margin:10px auto; text-align:center; font-size:14px;}
input[type="range"] {width:70%; margin-right:6px;}
input[type="number"] {width:60px;}
button {border:none; border-radius:10px; padding:7px 10px; cursor:pointer; transition:transform 0.2s ease;}
button:active {transform:scale(0.95);}
.red {background:#ff4d4d; color:white;}

/* --- Upside Down Text Box --- */
#text .box {max-width:100%; margin:0 auto; display:flex; flex-direction:column; gap:10px;}
#text textarea, #text input {width:100%; font-size:16px; text-align:center; border-radius:12px; padding:10px; background: rgba(0,0,0,0.2); backdrop-filter: blur(6px); color:white; resize:none; box-sizing:border-box;}

/* --- Toggles aligned properly --- */
#text .toggles {display:flex; justify-content:center; gap:20px; margin-bottom:10px;}
#text .toggle-item {display:flex; align-items:center; gap:6px; font-size:14px;}
#text .toggle-item input[type="checkbox"] {transform: scale(1.2); cursor:pointer;}
#text .toggle-item label {cursor:pointer; margin:0;}

/* --- GIF Preview --- */
#gifPreview {max-width:360px; margin:10px auto; border-radius:12px; display:block;}
.pulse {animation: pulse 1s infinite;}
@keyframes pulse {0%{opacity:0.3;}50%{opacity:1;}100%{opacity:0.3;}}
</style>
</head>
<body>

<div id="gradientBG"></div>

<h1>Image Toolkit Pro</h1>

<div class="nav">
  <button class="active" onclick="show('resizer',this)">(9:16) Image Resizer</button>
  <button onclick="show('text',this)">Upside Down Text Generator</button>
  <button onclick="show('gif',this)">GIF Generator</button>
</div>

<!-- IMAGE RESIZER -->
<div id="resizer" class="section active">
  <div class="control">
    Resolution: <input type="range" id="quality" min="10" max="100" value="100">
    <span id="qval">100%</span>
  </div>
  <div class="control"><button id="clear" class="red">Clear All</button></div>
  <div class="drop" onclick="pick()">Tap or Drop Images</div>
  <div class="gallery" id="gallery"></div>
</div>

<!-- UPSIDE DOWN TEXT -->
<div id="text" class="section">
  <div class="box">
    <input id="input" placeholder="Type here...">
    <div class="toggles">
      <div class="toggle-item">
        <input type="checkbox" id="flip">
        <label for="flip">Upside Down</label>
      </div>
      <div class="toggle-item">
        <input type="checkbox" id="reverse">
        <label for="reverse">Reverse</label>
      </div>
    </div>
    <textarea id="out" rows="4" readonly></textarea>
    <button onclick="copyText()">Copy</button>
  </div>
</div>

<!-- GIF GENERATOR -->
<div id="gif" class="section">
  <div class="drop" onclick="pickGif()">Tap or Drop Images</div>
  <div class="gif-list" id="gifList"></div>
  <div class="control">
    <button class="red" onclick="clearGif()">Clear All</button>
    <button onclick="generateGif()">Generate GIF</button>
  </div>
  <div class="control">
    Speed (sec/frame):
    <input type="range" id="speed" min="0.01" max="10" step="0.01" value="5">
    <input type="number" id="speedNum" min="0.01" max="10" step="0.01" value="5">
    <span id="speedVal">5.00</span>
  </div>
  <div id="gifStatus" style="text-align:center; margin:8px 0;"></div>
  <img id="gifPreview">
</div>

<script>
// --- Tabs ---
function show(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// --- Image Resizer ---
const gallery=document.getElementById("gallery");
const quality=document.getElementById("quality");
const qval=document.getElementById("qval");
quality.oninput=()=>qval.textContent=parseInt(quality.value)+"%";

function pick(){
  const i=document.createElement("input"); i.type="file"; i.multiple=true; i.accept="image/*";
  i.onchange=e=>handleFiles(e.target.files); i.click();
}
function handleFiles(files){
  [...files].forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>processImg(img);
      img.src=e.target.result;
    };
    r.readAsDataURL(f);
  });
}
function processImg(img){
  const baseWidth=360;
  const baseHeight=640;
  const scale=quality.value/100;
  const c=document.createElement("canvas");
  c.width=baseWidth*scale;
  c.height=baseHeight*scale;
  const ctx=c.getContext("2d");
  ctx.drawImage(img,0,0,c.width,c.height);
  const url=c.toDataURL("image/jpeg",1);
  const div=document.createElement("div");
  div.className="item";
  const image=document.createElement("img"); image.src=url;
  image.onclick=()=>download(url,"resized.jpg");
  const del=document.createElement("button"); del.textContent="X"; del.className="delete";
  del.onclick=()=>div.remove();
  div.appendChild(image); div.appendChild(del); gallery.appendChild(div);
}
document.getElementById("clear").onclick=()=>gallery.innerHTML="";
function download(src,name){const a=document.createElement("a"); a.href=src; a.download=name; a.click();}

// --- Upside Down Text ---
const input=document.getElementById("input");
const flip=document.getElementById("flip");
const reverse=document.getElementById("reverse");
const out=document.getElementById("out");
const upsideMap = {"a":"ɐ","b":"q","c":"ɔ","d":"p","e":"ǝ","f":"ɟ","g":"ƃ","h":"ɥ","i":"ᴉ","j":"ɾ","k":"ʞ","l":"l","m":"ɯ","n":"u","o":"o","p":"d","q":"b","r":"ɹ","s":"s","t":"ʇ","u":"n","v":"ʌ","w":"ʍ","x":"x","y":"ʎ","z":"z","A":"∀","B":"𐐒","C":"Ɔ","D":"p","E":"Ǝ","F":"Ⅎ","G":"פ","H":"H","I":"I","J":"ſ","K":"ʞ","L":"˥","M":"W","N":"N","O":"O","P":"Ԁ","Q":"Q","R":"ɹ","S":"S","T":"⊥","U":"∩","V":"Λ","W":"M","X":"X","Y":"⅄","Z":"Z"};
input.oninput=updateText; flip.onchange=updateText; reverse.onchange=updateText;
function updateText(){
  let v=input.value;
  if(reverse.checked) v=v.split('').reverse().join('');
  if(flip.checked) v=v.split('').map(c=>upsideMap[c]||c).reverse().join('');
  out.value=v;
}
function copyText(){navigator.clipboard.writeText(out.value);}
</script>
</body>
</html>
