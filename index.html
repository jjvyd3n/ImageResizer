<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Toolkit Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.3.2/gifshot.min.js"></script>

<style>
html, body {margin:0; padding:0; height:100%; width:100%;}
body {
  font-family:'Inter',system-ui,sans-serif;
  color:white;
  display:flex; flex-direction:column;
  min-height:100vh;
  background: linear-gradient(135deg,#667eea,#764ba2,#ff758c);
  overflow-x:hidden;
}

/* HEADER */
h1 {text-align:center; font-size:28px; font-weight:800; padding:20px 10px 10px;}

/* NAV */
.nav {display:flex; justify-content:center; gap:10px; position:relative;}
.nav button {
  background: rgba(255,255,255,0.15);
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:10px;
  transition: all 0.3s ease;
}
.nav button.active {color:black; font-weight:700;}
.nav button.active::after {
  content:"";
  position:absolute;
  bottom:-4px;
  height:3px;
  width:100%;
  left:0;
  background:white;
}

/* SECTIONS */
.section {display:none; flex:1; padding:12px; opacity:0; transition:0.4s;}
.section.active {display:flex; flex-direction:column; opacity:1;}

/* UI */
button {border:none; border-radius:10px; padding:7px 10px; cursor:pointer;}
.red {background:#ff4d4d;}
.control {max-width:300px; margin:10px auto; text-align:center;}
input[type="range"] {width:70%;}
.box {max-width:360px; margin:auto; display:flex; flex-direction:column; gap:10px;}
textarea, input {border:none; border-radius:10px; padding:10px;}

/* GALLERY */
.gallery {max-width:360px; margin:15px auto; display:flex; flex-direction:column; gap:8px;}
.item {position:relative;}
.item img {width:100%; border-radius:10px;}
.delete {position:absolute; top:5px; right:5px;}

/* DROP */
.drop {margin:15px auto; max-width:360px; padding:20px; border:2px dashed white; text-align:center; border-radius:12px; cursor:pointer;}

/* GIF */
.gif-list {display:flex; flex-wrap:wrap; gap:8px; max-width:360px; margin:10px auto;}
.gif-item {width:80px; height:80px; overflow:hidden; border-radius:10px;}
.gif-item img {width:100%; height:100%; object-fit:cover;}
#gifPreview {max-width:360px; margin:auto; border-radius:10px;}
.pulse {animation:pulse 1s infinite;}
@keyframes pulse {0%{opacity:.3;}50%{opacity:1;}100%{opacity:.3;}}
</style>
</head>

<body>

<h1>Image Toolkit Pro</h1>

<div class="nav">
  <button class="active" onclick="show('resizer',this)">9:16 Resizer</button>
  <button onclick="show('text',this)">Text</button>
  <button onclick="show('gif',this)">GIF</button>
</div>

<!-- RESIZER -->
<div id="resizer" class="section active">
  <div class="control">
    Resolution:
    <input type="range" id="quality" min="10" max="100" value="100">
    <span id="qval">100%</span>
  </div>

  <div class="control">
    <button class="red" onclick="gallery.innerHTML=''">Clear</button>
  </div>

  <div class="drop" onclick="pick()">Tap / Upload</div>
  <div class="gallery" id="gallery"></div>
</div>

<!-- TEXT -->
<div id="text" class="section">
  <div class="box">
    <input id="input" placeholder="Type...">
    <label><input type="checkbox" id="flip"> Upside</label>
    <label><input type="checkbox" id="reverse"> Reverse</label>
    <textarea id="out"></textarea>
  </div>
</div>

<!-- GIF -->
<div id="gif" class="section">
  <div class="drop" onclick="pickGif()">Upload Images</div>
  <div class="gif-list" id="gifList"></div>

  <div class="control">
    <button class="red" onclick="clearGif()">Clear</button>
    <button onclick="generateGif()">Generate</button>
  </div>

  <div class="control">
    Speed:
    <input type="range" id="speed" min="0.01" max="10" step="0.01" value="5">
  </div>

  <div id="gifStatus"></div>
  <img id="gifPreview">
</div>

<script>
// NAV
function show(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// RESIZER
const gallery=document.getElementById("gallery");
const quality=document.getElementById("quality");
const qval=document.getElementById("qval");
quality.oninput=()=>qval.textContent=quality.value+"%";

function pick(){
  const i=document.createElement("input");
  i.type="file"; i.multiple=true;
  i.onchange=e=>{
    [...e.target.files].forEach(f=>{
      const r=new FileReader();
      r.onload=e=>{
        const img=new Image();
        img.onload=()=>processImg(img);
        img.src=e.target.result;
      };
      r.readAsDataURL(f);
    });
  };
  i.click();
}

function processImg(img){
  const baseW=360, baseH=640;
  const q=quality.value/100;

  const small=document.createElement("canvas");
  small.width=baseW*q;
  small.height=baseH*q;
  const sctx=small.getContext("2d");

  const scale=Math.max(small.width/img.width,small.height/img.height);
  sctx.drawImage(img,0,0,img.width*scale,img.height*scale);

  const final=document.createElement("canvas");
  final.width=baseW; final.height=baseH;
  const fctx=final.getContext("2d");
  fctx.imageSmoothingEnabled=false;
  fctx.drawImage(small,0,0,baseW,baseH);

  const url=final.toDataURL("image/jpeg",q);

  const div=document.createElement("div");
  div.className="item";

  const im=document.createElement("img");
  im.src=url;
  im.onclick=()=>download(url);

  const del=document.createElement("button");
  del.textContent="X"; del.className="delete";
  del.onclick=()=>div.remove();

  div.appendChild(im); div.appendChild(del);
  gallery.appendChild(div);
}

function download(src){
  const a=document.createElement("a");
  a.href=src; a.download="image.jpg"; a.click();
}

// TEXT
const input=document.getElementById("input");
const out=document.getElementById("out");
input.oninput=()=>out.value=input.value.split('').reverse().join('');

// GIF
let gifImgs=[];
const gifList=document.getElementById("gifList");
const gifPreview=document.getElementById("gifPreview");
const gifStatus=document.getElementById("gifStatus");

function pickGif(){
  const i=document.createElement("input");
  i.type="file"; i.multiple=true;
  i.onchange=e=>{
    gifImgs=[...gifImgs,...e.target.files];
    renderGif();
  };
  i.click();
}

function renderGif(){
  gifList.innerHTML="";
  gifImgs.forEach((f,i)=>{
    const img=document.createElement("img");
    img.src=URL.createObjectURL(f);
    img.onclick=()=>gifImgs.splice(i,1)||renderGif();
    gifList.appendChild(img);
  });
}

function clearGif(){gifImgs=[]; gifList.innerHTML="";}

function generateGif(){
  gifStatus.textContent="Generating...";
  gifStatus.classList.add("pulse");

  const imgs=[];
  let loaded=0;

  gifImgs.forEach(f=>{
    const img=new Image();
    img.onload=()=>{
      loaded++;
      if(loaded===gifImgs.length) createGif(imgs);
    };
    img.src=URL.createObjectURL(f);
    imgs.push(img);
  });
}

function createGif(images){
  const processed=images.map(img=>{
    const c=document.createElement("canvas");
    const size=480;
    c.width=size; c.height=size;
    const ctx=c.getContext("2d");
    ctx.drawImage(img,0,0,size,size);
    return c.toDataURL("image/jpeg",0.8);
  });

  gifshot.createGIF({
    images:processed,
    interval:parseFloat(speed.value)
  },obj=>{
    gifStatus.classList.remove("pulse");
    if(!obj.error){
      gifPreview.src=obj.image;
      gifStatus.textContent="Done!";
    } else {
      gifStatus.textContent="Failed";
    }
  });
}
</script>

</body>
</html>
