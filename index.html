<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Toolkit Pro (9:16 Format)</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  color:white;
  min-height:100vh;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
  background-size: 400% 400%;
  animation: bg 15s ease infinite;
}

@keyframes bg {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

h1 {
  text-align:center;
  padding:12px;
  font-size:18px;
}

/* NAV */
.nav {
  display:flex;
  justify-content:center;
  gap:6px;
  flex-wrap:wrap;
  padding:8px;
}
.nav button {
  padding:6px 10px;
  border-radius:8px;
  border:none;
  font-weight:600;
}
.active { background:white; color:black; }

/* SECTIONS */
.section { display:none; padding:10px; }
.section.active { display:block; }

button {
  border:none;
  border-radius:8px;
  padding:7px 10px;
  font-weight:600;
  cursor:pointer;
}
button:active { transform:scale(0.92); }

.red { background:red; color:white; }

/* RESIZER */
.gallery {
  max-width:340px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.item {
  position:relative;
  border-radius:10px;
  overflow:hidden;
  animation: fade 0.3s ease;
}

.item img { width:100%; }

.delete {
  position:absolute;
  top:5px;
  right:5px;
  background:red;
  color:white;
  font-size:12px;
}

@keyframes fade {
  from {opacity:0; transform:translateY(8px)}
  to {opacity:1;}
}

/* DROP */
.drop {
  margin:10px;
  padding:20px;
  border:2px dashed white;
  text-align:center;
  border-radius:10px;
}

/* TEXT TOOL */
.box {
  max-width:340px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}
textarea, input {
  width:100%;
  border-radius:8px;
  border:none;
  padding:8px;
  font-size:14px;
}

/* GIF */
canvas { width:100%; border-radius:10px; }
</style>
</head>

<body>

<h1>Image Toolkit Pro (9:16 Format)</h1>

<div class="nav">
  <button class="active" onclick="show('resizer',this)">Resizer</button>
  <button onclick="show('text',this)">Text</button>
  <button onclick="show('gif',this)">GIF</button>
</div>

<!-- RESIZER -->
<div id="resizer" class="section active">

<div style="text-align:center">
Resolution
<input type="range" id="quality" min="10" max="100" value="100">
<span id="qval">100%</span>
</div>

<div style="text-align:center">
<button id="clear" class="red">Clear All</button>
</div>

<div class="drop" onclick="pick()">Tap or Drop Images</div>
<div class="gallery" id="gallery"></div>

</div>

<!-- TEXT -->
<div id="text" class="section">
<div class="box">

<input type="text" id="input" placeholder="Type here...">

<label><input type="checkbox" id="rev"> Reverse</label>
<label><input type="checkbox" id="flip"> Upside Down</label>

<textarea id="out" rows="4"></textarea>

<button onclick="copy()">Copy</button>

</div>
</div>

<!-- GIF -->
<div id="gif" class="section">

<input type="file" id="gifInput" multiple>

<label>Speed</label>
<input type="range" id="speed" min="100" max="1000" value="400">

<canvas id="gifCanvas"></canvas>

<button onclick="makeGif()">Generate GIF</button>

</div>

<script>
/* NAV */
function show(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

/* RESIZER */
const gallery=document.getElementById("gallery");
const q=document.getElementById("quality");
const qval=document.getElementById("qval");

q.oninput=()=>qval.textContent=q.value+"%";

function pick(){
  const i=document.createElement("input");
  i.type="file"; i.multiple=true; i.accept="image/*";
  i.onchange=e=>handle(e.target.files);
  i.click();
}

function handle(files){
  [...files].forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>process(img);
      img.src=e.target.result;
    };
    r.readAsDataURL(f);
  });
}

function process(img){
  const c=document.createElement("canvas");
  const ctx=c.getContext("2d");

  const scale=q.value/100;
  c.width=540*scale;
  c.height=960*scale;

  ctx.drawImage(img,0,0,c.width,c.height);

  const url=c.toDataURL("image/jpeg",1);

  const div=document.createElement("div");
  div.className="item";

  const image=document.createElement("img");
  image.src=url;

  const del=document.createElement("button");
  del.textContent="X";
  del.className="delete";
  del.onclick=()=>div.remove();

  div.appendChild(image);
  div.appendChild(del);
  gallery.appendChild(div);
}

document.getElementById("clear").onclick=()=>gallery.innerHTML="";

/* TEXT */
const map={'a':'ɐ','b':'q','c':'ɔ','d':'p','e':'ǝ','f':'ɟ','g':'ƃ','h':'ɥ','i':'ᴉ'};
function update(){
  let v=input.value;
  if(rev.checked) v=v.split('').reverse().join('');
  if(flip.checked) v=v.split('').map(c=>map[c]||c).reverse().join('');
  out.value=v;
}
input.oninput=update;
rev.onchange=update;
flip.onchange=update;

function copy(){
  navigator.clipboard.writeText(out.value);
}

/* GIF */
function makeGif(){
  const files=document.getElementById("gifInput").files;
  const canvas=document.getElementById("gifCanvas");
  const ctx=canvas.getContext("2d");
  if(!files.length) return;

  let i=0;
  const imgs=[...files].map(f=>{
    const img=new Image();
    img.src=URL.createObjectURL(f);
    return img;
  });

  imgs[0].onload=()=>{
    canvas.width=540;
    canvas.height=960;
    setInterval(()=>{
      ctx.drawImage(imgs[i%imgs.length],0,0,540,960);
      i++;
    },speed.value);
  }
}
</script>

</body>
</html>
