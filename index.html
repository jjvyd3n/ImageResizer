<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Resizer Pro</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color:white;
  text-align:center;
}

.topbar {
  position:sticky;
  top:0;
  background: rgba(0,0,0,0.5);
  padding:10px;
  backdrop-filter: blur(10px);
  z-index:10;
}

button {
  margin:5px;
  padding:8px 14px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}

.active {
  background:black;
  color:white;
}

#drop {
  margin:20px;
  padding:40px;
  border:2px dashed white;
  border-radius:15px;
}

.gallery {
  max-width:420px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.item {
  position:relative;
  border-radius:12px;
  overflow:hidden;
  animation: fadeIn 0.4s ease;
}

img {
  width:100%;
}

.delete {
  position:absolute;
  top:8px;
  right:8px;
  background:red;
  color:white;
  font-size:12px;
}

.viewer {
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:100;
}

.viewer img {
  max-width:100%;
  max-height:100%;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1;}
}
</style>
</head>
<body>

<div class="topbar">
  <button id="stretch">Stretch</button>
  <button id="fit">Fit</button>
  <button id="clear">Clear All</button>
</div>

<div id="drop">Tap or Drop Images</div>
<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer">
  <img id="viewerImg">
</div>

<script>
let mode = localStorage.getItem("mode") || "stretch";

const stretchBtn = document.getElementById("stretch");
const fitBtn = document.getElementById("fit");
const clearBtn = document.getElementById("clear");
const gallery = document.getElementById("gallery");
const drop = document.getElementById("drop");

const viewer = document.getElementById("viewer");
const viewerImg = document.getElementById("viewerImg");

function updateUI(){
  stretchBtn.classList.toggle("active", mode==="stretch");
  fitBtn.classList.toggle("active", mode==="fit");
}
updateUI();

stretchBtn.onclick = () => {
  mode="stretch";
  localStorage.setItem("mode", mode);
  updateUI();
};

fitBtn.onclick = () => {
  mode="fit";
  localStorage.setItem("mode", mode);
  updateUI();
};

clearBtn.onclick = () => gallery.innerHTML="";

drop.onclick = () => {
  const input = document.createElement("input");
  input.type="file";
  input.multiple=true;
  input.accept="image/*";
  input.onchange = e => handleFiles(e.target.files);
  input.click();
};

function handleFiles(files){
  [...files].forEach(file=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>process(img);
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function process(img){
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const W = 540, H = 960;
  canvas.width=W;
  canvas.height=H;

  if(mode==="stretch"){
    ctx.drawImage(img,0,0,W,H);
  } else {
    // REAL blur fix (draw twice with scaling)
    ctx.filter="blur(30px)";
    ctx.drawImage(img,0,0,W,H);
    ctx.filter="none";

    const scale = Math.min(W/img.width, H/img.height);
    const w = img.width*scale;
    const h = img.height*scale;
    const x = (W-w)/2;
    const y = (H-h)/2;

    ctx.drawImage(img,0,0,img.width,img.height,x,y,w,h);
  }

  const url = canvas.toDataURL("image/png");

  const div = document.createElement("div");
  div.className="item";

  const image = document.createElement("img");
  image.src=url;

  // TAP → FULLSCREEN
  image.onclick = ()=>{
    viewer.style.display="flex";
    viewerImg.src=url;
  };

  // DELETE
  const del = document.createElement("button");
  del.textContent="X";
  del.className="delete";
  del.onclick = ()=>div.remove();

  div.appendChild(image);
  div.appendChild(del);
  gallery.appendChild(div);
}

// VIEWER CONTROLS
viewer.onclick = ()=> viewer.style.display="none";

// SWIPE SUPPORT
let startX=0;

viewer.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

viewer.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;
  if(Math.abs(startX-endX)>50){
    let imgs = [...document.querySelectorAll(".item img")];
    let current = imgs.findIndex(i=>i.src===viewerImg.src);

    if(startX > endX && current < imgs.length-1){
      viewerImg.src = imgs[current+1].src;
    }
    if(startX < endX && current > 0){
      viewerImg.src = imgs[current-1].src;
    }
  }
});
</script>

</body>
</html>
