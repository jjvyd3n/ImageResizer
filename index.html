<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok 9:16 Resizer Toggle</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  padding: 20px;
  color: #333;
}
h2 { margin-bottom: 10px; font-weight:600; color:#fff; text-shadow:1px1px4px rgba(0,0,0,0.3);}
#drop-area { border:2px dashed #fff; border-radius:15px; background: rgba(255,255,255,0.2); padding:50px 20px; margin-bottom:15px; box-shadow:0 8px 15px rgba(0,0,0,0.2); cursor:pointer;}
#drop-area.dragover { background: rgba(255,255,255,0.35); transform: scale(1.02);}
.toggle-container { margin-bottom: 25px; color: #fff; font-weight:600;}
.gallery { display:flex; flex-direction:column; gap:20px; max-width:420px; margin:0 auto;}
.canvas-container { border-radius:12px; overflow:hidden; box-shadow:0 6px 12px rgba(0,0,0,0.15);}
.resized-img { width:100%; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.15);}
@media (max-width:500px){ #drop-area{padding:40px 15px;} .canvas-container{max-width:95%;}}
</style>
</head>
<body>
<h2>TikTok 9:16 Resizer</h2>
<div class="toggle-container">
  Mode: 
  <select id="mode-select">
    <option value="stretch">Stretch (Distort)</option>
    <option value="fit">Fit (Keep Aspect)</option>
  </select>
</div>
<div id="drop-area">Tap or Drop Images Here</div>
<div class="gallery" id="output"></div>
<script>
const dropArea = document.getElementById('drop-area');
const output = document.getElementById('output');
const modeSelect = document.getElementById('mode-select');

dropArea.addEventListener('click', () => {
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.multiple = true;
  fileInput.accept = 'image/*';
  fileInput.onchange = e => handleFiles(e.target.files);
  fileInput.click();
});

dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('dragover'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));
dropArea.addEventListener('drop', e => { e.preventDefault(); dropArea.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

function handleFiles(files){
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => processImage(img);
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function processImage(img){
  const container = document.createElement('div');
  container.className='canvas-container';

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  const canvasWidth = 540;
  const canvasHeight = 960;
  canvas.width = canvasWidth;
  canvas.height = canvasHeight;

  const mode = modeSelect.value;

  if(mode === 'stretch'){
    // Stretch to fill entire canvas (distorted)
    ctx.drawImage(img, 0, 0, img.width, img.height, 0, 0, canvasWidth, canvasHeight);
  } else {
    // Fit mode: scale to fit, keep aspect
    const scale = Math.min(canvasWidth / img.width, canvasHeight / img.height);
    const imgWidth = img.width * scale;
    const imgHeight = img.height * scale;
    const dx = (canvasWidth - imgWidth) / 2;
    const dy = (canvasHeight - imgHeight) / 2;
    // Optional background
    ctx.fillStyle = 'white';
    ctx.fillRect(0,0,canvasWidth,canvasHeight);
    ctx.drawImage(img, 0,0,img.width,img.height, dx, dy, imgWidth, imgHeight);
  }

  const finalImg = new Image();
  finalImg.src = canvas.toDataURL('image/png', 1);
  finalImg.className = 'resized-img';
  finalImg.alt = 'TikTok 9:16 resized';
  container.appendChild(finalImg);
  output.appendChild(container);
}
</script>
</body>
</html>
